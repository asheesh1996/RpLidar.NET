name: Build, Sign & Publish NuGet

on:
  push:
    branches:
      - main
    tags:
      - 'v*'   # v1.0.0, v1.2.3, etc.

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Pack
  # Runs on every push to main and on every v* tag.
  # Produces an unsigned .nupkg and uploads it as a workflow artifact.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required: SignPath uses OIDC to verify build provenance
      contents: read
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}

    steps:
      - name: Checkout (full history for MinVer)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full git history to resolve the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore RpLidar.NET/RpLidar.NET.csproj

      - name: Build
        run: dotnet build RpLidar.NET/RpLidar.NET.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack RpLidar.NET/RpLidar.NET.csproj --no-build -c Release -o ./nupkg

      - name: Show packages
        run: ls -la ./nupkg/

      # actions/upload-artifact v4+ is required by SignPath
      - name: Upload unsigned package
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-nupkg
          path: ./nupkg/*.nupkg
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Sign with SignPath Foundation
  # Only runs on v* version tags to avoid signing every dev push.
  # Submits the unsigned artifact to SignPath, waits for signing, and
  # re-uploads the signed package as a new artifact.
  # ─────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign with SignPath Foundation
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required: SignPath OIDC origin verification
      actions: read     # required: SignPath reads workflow/job details via GITHUB_TOKEN
      contents: read    # required: SignPath downloads the artifact via GITHUB_TOKEN

    steps:
      - name: Submit signing request
        id: signing
        uses: signpath/github-action-submit-signing-request@v2
        with:
          connector-url: 'https://githubactions.connectors.signpath.io'
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'rplidar-net'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'nuget-sign'
          github-artifact-id: '${{ needs.build.outputs.unsigned-artifact-id }}'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: '600'
          output-artifact-directory: './signed-nupkg'

      - name: Show signed packages
        run: ls -la ./signed-nupkg/

      - name: Upload signed package
        uses: actions/upload-artifact@v4
        with:
          name: signed-nupkg
          path: ./signed-nupkg/*.nupkg
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Publish
  # Only runs on v* version tags, after signing completes.
  # Downloads the signed package and pushes it to NuGet.org and
  # GitHub Packages.
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to NuGet.org & GitHub Packages
    needs: sign
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to publish to GitHub Packages

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Download signed package
        uses: actions/download-artifact@v4
        with:
          name: signed-nupkg
          path: ./signed-nupkg

      - name: Show downloaded packages
        run: ls -la ./signed-nupkg/

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./signed-nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source \
            --username asheesh1996 \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/asheesh1996/index.json"
          dotnet nuget push ./signed-nupkg/*.nupkg \
            --source github \
            --skip-duplicate
